<!DOCTYPE html>
<html lang="sv">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Översikt – AlpenTind Platform</title>
  <link rel="stylesheet" href="css/design-system.css">
  <link rel="stylesheet" href="css/components.css">
  <link rel="stylesheet" href="css/layout.css">
  <link rel="stylesheet" href="css/pages.css">
</head>
<body>

  <!-- Sidopanel -->
  <aside class="sidebar" id="sidebar" aria-label="Sidopanel"></aside>

  <!-- Sidhuvud -->
  <header class="header" id="header" role="banner"></header>

  <!-- Huvudinnehåll -->
  <main class="main" id="main-content">
    <div class="pv-oversikt">

      <!-- Plattformsnavigering – snabblänkar -->
      <nav class="pv-nav-shortcuts" aria-label="Plattformsnavigering" id="oversikt-nav-shortcuts"></nav>

      <!-- Sektion A: Kalender (Dominant) -->
      <section class="content-section pv-section--dominant" aria-labelledby="oversikt-cal-heading">
        <div class="section-header">
          <h2 id="oversikt-cal-heading">Kalender</h2>
          <a class="link" href="kalender.html" aria-label="Öppna kalendervy">
            <i data-feather="external-link" style="width:14px;height:14px;vertical-align:middle"></i>
            Öppna kalender
          </a>
        </div>
        <div id="oversikt-month-calendar"></div>
      </section>

      <!-- Nedre sektioner: Uppmärksamhet + Aktivt arbete -->
      <div class="pv-lower-grid">

        <!-- Sektion B: Uppmärksamhet (Platshållare) -->
        <section class="content-section" aria-labelledby="oversikt-attention-heading">
          <div class="section-header">
            <h2 id="oversikt-attention-heading">
              Uppmärksamhet
              <span class="pv-placeholder-tag" title="Temporär platshållare – validerar placering">Platshållare</span>
            </h2>
          </div>
          <div id="oversikt-attention"></div>
        </section>

        <!-- Sektion C: Aktivt arbete (Projektion) -->
        <section class="content-section" aria-labelledby="oversikt-active-work-heading">
          <div class="section-header">
            <h2 id="oversikt-active-work-heading">Aktivt arbete</h2>
            <span class="badge badge-info" title="Projektion – äger ingen information">Projektion</span>
          </div>
          <div id="oversikt-active-work"></div>
        </section>

      </div>

    </div>
  </main>

  <script src="https://unpkg.com/feather-icons/dist/feather.min.js"></script>
  <script src="js/mock-data.js"></script>
  <script src="js/calendar-store.js"></script>
  <script src="js/ui.js"></script>
  <script src="js/navigation.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', function() {
      if (!localStorage.getItem('alpentind-user-logged-in')) {
        window.location.href = 'index.html';
        return;
      }
      initNavigation('nav-0');
      renderOversikt();
    });
  </script>
</body>
</html>
