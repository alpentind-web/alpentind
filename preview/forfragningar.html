<!DOCTYPE html>
<html lang="sv">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Förfrågningar – AlpenTind Platform</title>
  <link rel="stylesheet" href="css/design-system.css">
  <link rel="stylesheet" href="css/components.css">
  <link rel="stylesheet" href="css/layout.css">
  <link rel="stylesheet" href="css/pages.css">
</head>
<body>

  <aside class="sidebar" id="sidebar" aria-label="Sidopanel"></aside>
  <header class="header" id="header" role="banner"></header>
  <main class="main" id="main-content">
    <div class="page active" id="forfragningar-page">

      <section class="page-header" aria-labelledby="inquiry-title">
        <h1 id="inquiry-title">Förfrågningar</h1>
        <p class="text-muted">Inquiry Workspace – hantera inkommande förfrågan från första kontakt till utfall.</p>
      </section>

      <section class="content-section inquiry-entry" aria-labelledby="inquiry-entry-heading">
        <div class="section-header">
          <h2 id="inquiry-entry-heading">Incoming Inquiry</h2>
          <button class="btn btn-primary" type="button" id="inquiry-create-button">
            <i data-feather="plus-circle" style="width:16px;height:16px" aria-hidden="true"></i>
            Skapa förfrågan
          </button>
        </div>
        <div class="inquiry-selector-bar" id="inquiry-selector" role="tablist" aria-label="Välj förfrågan"></div>
      </section>

      <section class="inquiry-workspace-shell" id="inquiry-workspace"></section>

    </div>
  </main>

  <script src="https://unpkg.com/feather-icons/dist/feather.min.js"></script>
  <script src="js/mock-data.js"></script>
  <script src="js/ui.js"></script>
  <script src="js/navigation.js"></script>
  <script src="js/workflow-guidance.js"></script>
  <script src="js/inquiry-engine.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', function() {
      if (!localStorage.getItem('alpentind-user-logged-in')) {
        window.location.href = 'index.html';
        return;
      }
      initNavigation('nav-3');
      renderInquiryEngine();
    });
  </script>
</body>
</html>
