<!DOCTYPE html>
<html lang="sv">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Förfrågningar – AlpenTind Platform</title>
  <link rel="stylesheet" href="css/design-system.css">
  <link rel="stylesheet" href="css/components.css">
  <link rel="stylesheet" href="css/layout.css">
  <link rel="stylesheet" href="css/pages.css">
</head>
<body>

  <aside class="sidebar" id="sidebar" aria-label="Sidopanel"></aside>
  <header class="header" id="header" role="banner"></header>
  <main class="main" id="main-content">
    <div class="page active" id="forfragningar-page">

      <section class="page-header inquiry-page-header" aria-labelledby="inquiry-title">
        <div class="inquiry-page-header-row">
          <div>
            <h1 id="inquiry-title">Förfrågningar</h1>
            <p class="text-muted">Inkommande förfrågningar</p>
          </div>
          <div class="inquiry-page-header-actions">
            <div id="inquiry-website-notification-slot"></div>
            <button class="btn btn-primary" type="button" id="inquiry-create-button">
              <i data-feather="plus" style="width:16px;height:16px" aria-hidden="true"></i>
              Ny förfrågan
            </button>
          </div>
        </div>
      </section>

      <div class="inquiry-inbox-layout">

        <div class="inquiry-inbox-panel" role="list" aria-label="Förfrågningar">
          <div id="inquiry-inbox-list"></div>
        </div>

        <div class="inquiry-editor-panel" id="inquiry-editor-panel" aria-label="Redigera förfrågan"></div>

      </div>

    </div>
  </main>

  <script src="https://unpkg.com/feather-icons/dist/feather.min.js"></script>
  <script src="js/mock-data.js"></script>
  <script src="js/ui.js"></script>
  <script src="js/navigation.js"></script>
  <script src="js/platform-modal.js"></script>
  <script src="js/inquiry-engine.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', function() {
      if (!localStorage.getItem('alpentind-user-logged-in')) {
        window.location.href = 'index.html';
        return;
      }
      initNavigation('nav-3');
      renderInquiryEngine();
    });
  </script>
</body>
</html>
