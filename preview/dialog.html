<!DOCTYPE html>
<html lang="sv">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dialoger – AlpenTind Platform</title>
  <link rel="stylesheet" href="css/design-system.css">
  <link rel="stylesheet" href="css/components.css">
  <link rel="stylesheet" href="css/layout.css">
  <link rel="stylesheet" href="css/pages.css">
</head>
<body>

  <!-- Sidopanel -->
  <aside class="sidebar" id="sidebar" aria-label="Sidopanel"></aside>

  <!-- Sidhuvud -->
  <header class="header" id="header" role="banner"></header>

  <!-- Huvudinnehåll -->
  <main class="main" id="main-content">
    <div class="page active" id="dialog-page">

      <div class="page-header">
        <h1>Dialoger</h1>
        <p class="text-muted">Hantera pågående samtal med personer</p>
      </div>

      <!-- Personväljare -->
      <div class="dialog-selector-bar" id="dialog-selector" role="tablist" aria-label="Välj dialog"></div>

      <!-- Tre-kolumns arbetsyta -->
      <div class="dialog-workspace">

        <!-- Vänster kolumn: PersonCard -->
        <div id="dialog-person-slot"></div>

        <!-- Mittkolumn: ConversationCard -->
        <div id="dialog-conversation-slot"></div>

        <!-- Höger kolumn: NextStepCard + RecommendationCard -->
        <div>
          <div id="dialog-nextstep-slot"></div>
          <div id="dialog-recommendation-slot"></div>
        </div>

      </div>

    </div>
  </main>

  <script src="https://unpkg.com/feather-icons/dist/feather.min.js"></script>
  <script src="js/mock-data.js"></script>
  <script src="js/ui.js"></script>
  <script src="js/navigation.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', function() {
      if (!localStorage.getItem('alpentind-user-logged-in')) {
        window.location.href = 'index.html';
        return;
      }
      initNavigation('nav-12');
      renderDialog();
    });
  </script>
</body>
</html>
