<!DOCTYPE html>
<html lang="sv">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dialoger – AlpenTind Platform</title>
  <link rel="stylesheet" href="css/design-system.css">
  <link rel="stylesheet" href="css/components.css">
  <link rel="stylesheet" href="css/layout.css">
  <link rel="stylesheet" href="css/pages.css">
</head>
<body>

  <aside class="sidebar" id="sidebar" aria-label="Sidopanel"></aside>
  <header class="header" id="header" role="banner"></header>

  <main class="main" id="main-content">
    <div class="page active" id="dialog-page">

      <section class="page-header inquiry-page-header" aria-labelledby="dialog-title">
        <div class="inquiry-page-header-row">
          <div>
            <h1 id="dialog-title">Dialog</h1>
            <p class="text-muted">Organiserade anteckningar för pågående samtal</p>
          </div>
          <div class="inquiry-page-header-actions">
            <button class="btn btn-primary" type="button" id="dialog-create-empty-button">
              <i data-feather="plus" style="width:16px;height:16px" aria-hidden="true"></i>
              Ny tom dialog
            </button>
          </div>
        </div>
      </section>

      <div class="dialog-inbox-layout">
        <div class="dialog-inbox-panel" role="list" aria-label="Dialoginkorg">
          <div id="dialog-inbox-list"></div>
        </div>
        <div class="dialog-workspace-panel" id="dialog-workspace-panel" aria-label="Dialog workspace"></div>
      </div>

    </div>
  </main>

  <script src="https://unpkg.com/feather-icons/dist/feather.min.js"></script>
  <script src="js/mock-data.js"></script>
  <script src="js/ui.js"></script>
  <script src="js/navigation.js"></script>
  <script src="js/platform-modal.js"></script>
  <script src="js/contact-store.js"></script>
  <script src="js/dialog-engine.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', function() {
      if (!localStorage.getItem('alpentind-user-logged-in')) {
        window.location.href = 'index.html';
        return;
      }
      initNavigation('nav-12');
      renderDialog();
    });
  </script>
</body>
</html>
