<!DOCTYPE html>
<html lang="sv">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Arbetsdag – AlpenTind Platform</title>
  <link rel="stylesheet" href="css/design-system.css">
  <link rel="stylesheet" href="css/components.css">
  <link rel="stylesheet" href="css/layout.css">
  <link rel="stylesheet" href="css/pages.css">
</head>
<body>

  <!-- Sidopanel -->
  <aside class="sidebar" id="sidebar" aria-label="Sidopanel"></aside>

  <!-- Sidhuvud -->
  <header class="header" id="header" role="banner"></header>

  <!-- Huvudinnehåll -->
  <main class="main" id="main-content">
    <div class="page active" id="arbetsdag-page">

      <!-- Lägesbild – operationell översikt -->
      <div class="lagesbild" id="lagesbild" role="status" aria-label="Lägesbild"></div>

      <!-- Workspace – 3-kolumns operationell yta -->
      <div class="workspace-grid">

        <!-- Vänster: Kräver uppmärksamhet -->
        <div class="workspace-col workspace-col--attention">
          <section class="content-section" aria-labelledby="attention-heading">
            <div class="section-header">
              <h2 id="attention-heading">Kräver din uppmärksamhet</h2>
            </div>
            <div id="attention-grid"></div>
          </section>
        </div>

        <!-- Mitten: Planeringskalender + Veckoagenda -->
        <div class="workspace-col workspace-col--calendar">
          <section class="content-section" aria-labelledby="calendar-heading">
            <div class="section-header">
              <h2 id="calendar-heading">Planeringskalender</h2>
            </div>
            <div id="operational-calendar"></div>
          </section>
          <section class="content-section" aria-labelledby="agenda-heading">
            <div class="section-header">
              <h2 id="agenda-heading">Veckoagenda</h2>
              <span class="section-header-label">v. 29 – 13–19 jul 2026</span>
            </div>
            <div id="week-agenda"></div>
          </section>
        </div>

        <!-- Höger: Min arbetskö + Kommande upplevelser -->
        <div class="workspace-col workspace-col--work">
          <section class="content-section" aria-labelledby="workqueue-heading">
            <div class="section-header">
              <h2 id="workqueue-heading">Min arbetskö</h2>
            </div>
            <div id="work-queue-list"></div>
          </section>
          <section class="content-section" aria-labelledby="experiences-heading">
            <div class="section-header">
              <h2 id="experiences-heading">Kommande upplevelser</h2>
              <a href="upplevelser.html" class="link">Visa alla →</a>
            </div>
            <div id="experiences-grid"></div>
          </section>
        </div>

      </div>

      <!-- Snabbåtgärder -->
      <section class="content-section content-section--secondary" aria-labelledby="quickactions-heading">
        <div class="section-header">
          <h2 id="quickactions-heading" class="section-header-secondary">Snabbåtgärder</h2>
        </div>
        <div class="quick-actions" id="quick-actions"></div>
      </section>

    </div>
  </main>

  <script src="https://unpkg.com/feather-icons/dist/feather.min.js"></script>
  <script src="js/mock-data.js"></script>
  <script src="js/ui.js"></script>
  <script src="js/navigation.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', function() {
      if (!localStorage.getItem('alpentind-user-logged-in')) {
        window.location.href = 'index.html';
        return;
      }
      initNavigation('nav-1');
      renderDashboard();
    });
  </script>
</body>
</html>
