<!DOCTYPE html>
<html lang="sv">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Min arbetsdag – AlpenTind Platform</title>
  <link rel="stylesheet" href="css/design-system.css">
  <link rel="stylesheet" href="css/components.css">
  <link rel="stylesheet" href="css/layout.css">
  <link rel="stylesheet" href="css/pages.css">
</head>
<body>

  <!-- Sidopanel -->
  <aside class="sidebar" id="sidebar" aria-label="Sidopanel"></aside>

  <!-- Sidhuvud -->
  <header class="header" id="header" role="banner"></header>

  <!-- Huvudinnehåll -->
  <main class="main" id="main-content">
    <div class="page active" id="arbetsdag-page">

      <!-- Informationsbanner – diskret dagsöversikt -->
      <div class="info-banner" id="info-banner" role="status" aria-label="Dagens översikt"></div>

      <!-- Dagens uppgifter -->
      <section class="content-section" aria-labelledby="tasks-heading">
        <div class="section-header">
          <h2 id="tasks-heading">Dagens uppgifter</h2>
          <a href="#" class="link">Visa alla →</a>
        </div>
        <div class="grid grid-4" id="tasks-grid"></div>
      </section>

      <!-- Kommande avgångar -->
      <section class="content-section" aria-labelledby="departures-heading">
        <div class="section-header">
          <h2 id="departures-heading">Kommande avgångar</h2>
          <a href="upplevelser.html" class="link">Visa alla →</a>
        </div>
        <div class="grid grid-3" id="departures-grid"></div>
      </section>

      <!-- Nya bokningar -->
      <section class="content-section" aria-labelledby="bookings-heading">
        <div class="section-header">
          <h2 id="bookings-heading">Nya bokningar</h2>
          <a href="#" class="link">Visa alla →</a>
        </div>
        <div class="grid grid-4" id="bookings-grid"></div>
      </section>

      <!-- Väntar på bekräftelse -->
      <section class="content-section" aria-labelledby="awaiting-heading">
        <div class="section-header">
          <h2 id="awaiting-heading">Väntar på bekräftelse</h2>
          <a href="#" class="link">Visa alla →</a>
        </div>
        <div class="grid grid-2" id="awaiting-grid"></div>
      </section>

      <!-- Betalningar att följa upp -->
      <section class="content-section" aria-labelledby="payments-heading">
        <div class="section-header">
          <h2 id="payments-heading">Betalningar att följa upp</h2>
          <a href="#" class="link">Visa alla →</a>
        </div>
        <div id="payments-table"></div>
      </section>

      <!-- Boenden som inte är bokade -->
      <section class="content-section" aria-labelledby="accommodations-heading">
        <div class="section-header">
          <h2 id="accommodations-heading">Boenden att boka</h2>
          <a href="#" class="link">Visa alla →</a>
        </div>
        <div id="accommodations-table"></div>
      </section>

      <!-- Senaste kundmeddelanden -->
      <section class="content-section" aria-labelledby="messages-heading">
        <div class="section-header">
          <h2 id="messages-heading">Senaste kundmeddelanden</h2>
          <a href="#" class="link">Visa alla →</a>
        </div>
        <div id="messages-list" role="list"></div>
      </section>

      <!-- Vädervarningar -->
      <section class="content-section" aria-labelledby="weather-heading">
        <div class="section-header">
          <h2 id="weather-heading">Vädervarningar</h2>
          <a href="#" class="link">Visa alla →</a>
        </div>
        <div id="weather-warnings"></div>
      </section>

    </div>
  </main>

  <script src="https://unpkg.com/feather-icons/dist/feather.min.js"></script>
  <script src="js/mock-data.js"></script>
  <script src="js/ui.js"></script>
  <script src="js/navigation.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', function() {
      if (!localStorage.getItem('alpentind-user-logged-in')) {
        window.location.href = 'index.html';
        return;
      }
      initNavigation('nav-1');
      renderDashboard();
    });
  </script>
</body>
</html>
