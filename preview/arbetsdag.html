<!DOCTYPE html>
<html lang="sv">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Arbetsdag – AlpenTind Platform</title>
  <link rel="stylesheet" href="css/design-system.css">
  <link rel="stylesheet" href="css/components.css">
  <link rel="stylesheet" href="css/layout.css">
  <link rel="stylesheet" href="css/pages.css">
</head>
<body>

  <!-- Sidopanel -->
  <aside class="sidebar" id="sidebar" aria-label="Sidopanel"></aside>

  <!-- Sidhuvud -->
  <header class="header" id="header" role="banner"></header>

  <!-- Huvudinnehåll -->
  <main class="main" id="main-content">
    <div class="page active" id="arbetsdag-page">

      <!-- Lägesbild -->
      <div class="info-banner" id="info-banner" role="status" aria-label="Lägesbild"></div>

      <!-- Kräver din uppmärksamhet -->
      <section class="content-section" aria-labelledby="attention-heading">
        <div class="section-header">
          <h2 id="attention-heading">Kräver din uppmärksamhet</h2>
        </div>
        <div id="attention-grid"></div>
      </section>

      <!-- Framåt (platshållare) -->
      <section class="content-section" aria-labelledby="workday-forward-heading">
        <div class="section-header">
          <h2 id="workday-forward-heading">Framåt</h2>
        </div>
        <div id="workday-forward-focus"></div>
      </section>

      <!-- Veckoagenda -->
      <section class="content-section" aria-labelledby="agenda-heading">
        <div class="section-header">
          <h2 id="agenda-heading">Veckoagenda</h2>
        </div>
        <div id="week-agenda-list"></div>
      </section>

      <!-- Min arbetskö -->
      <section class="content-section" aria-labelledby="workqueue-heading">
        <div class="section-header">
          <h2 id="workqueue-heading">Min arbetskö</h2>
        </div>
        <div id="work-queue-list"></div>
      </section>

      <!-- Kommande upplevelser -->
      <section class="content-section" aria-labelledby="experiences-heading">
        <div class="section-header">
          <h2 id="experiences-heading">Kommande upplevelser</h2>
        </div>
        <div id="experiences-grid"></div>
      </section>

      <!-- Snabbåtgärder -->
      <section class="content-section" aria-labelledby="quickactions-heading">
        <div class="section-header">
          <h2 id="quickactions-heading">Snabbåtgärder</h2>
        </div>
        <div class="quick-actions" id="quick-actions"></div>
      </section>

    </div>
  </main>

  <script src="https://unpkg.com/feather-icons/dist/feather.min.js"></script>
  <script src="js/mock-data.js"></script>
  <script src="js/ui.js"></script>
  <script src="js/navigation.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', function() {
      if (!localStorage.getItem('alpentind-user-logged-in')) {
        window.location.href = 'index.html';
        return;
      }
      initNavigation('nav-1');
      renderDashboard();
    });
  </script>
</body>
</html>
