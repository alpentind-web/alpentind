<!DOCTYPE html>
<html lang="sv">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Arbetsdag – AlpenTind Platform</title>
  <link rel="stylesheet" href="css/design-system.css">
  <link rel="stylesheet" href="css/components.css">
  <link rel="stylesheet" href="css/layout.css">
  <link rel="stylesheet" href="css/pages.css">
</head>
<body>

  <!-- Sidopanel -->
  <aside class="sidebar" id="sidebar" aria-label="Sidopanel"></aside>

  <!-- Sidhuvud -->
  <header class="header" id="header" role="banner"></header>

  <!-- Huvudinnehåll -->
  <main class="main" id="main-content">
    <div class="page active" id="arbetsdag-page">

      <!-- Informationsbanner – diskret dagsöversikt -->
      <div class="info-banner" id="info-banner" role="status" aria-label="Dagens översikt"></div>

      <!-- Operationell kalender -->
      <section class="content-section" aria-labelledby="calendar-heading">
        <div class="section-header">
          <h2 id="calendar-heading">Kalender</h2>
        </div>
        <div id="operational-calendar"></div>
      </section>

      <!-- Kräver uppmärksamhet -->
      <section class="content-section" aria-labelledby="attention-heading">
        <div class="section-header">
          <h2 id="attention-heading">Kräver uppmärksamhet</h2>
        </div>
        <div class="grid grid-3" id="attention-grid"></div>
      </section>

      <!-- Kommande upplevelser -->
      <section class="content-section" aria-labelledby="experiences-heading">
        <div class="section-header">
          <h2 id="experiences-heading">Kommande upplevelser</h2>
          <a href="upplevelser.html" class="link">Visa alla →</a>
        </div>
        <div class="grid grid-3" id="experiences-grid"></div>
      </section>

      <!-- Pågående dialoger -->
      <section class="content-section" aria-labelledby="dialogues-heading">
        <div class="section-header">
          <h2 id="dialogues-heading">Pågående dialoger</h2>
          <a href="#" class="link">Visa alla →</a>
        </div>
        <div id="dialogues-list" role="list"></div>
      </section>

      <!-- Min arbetskö -->
      <section class="content-section" aria-labelledby="workqueue-heading">
        <div class="section-header">
          <h2 id="workqueue-heading">Min arbetskö</h2>
        </div>
        <div id="work-queue-list"></div>
      </section>

      <!-- Dagens uppgifter – inline redigerbara -->
      <section class="content-section" aria-labelledby="todos-heading">
        <div class="section-header">
          <h2 id="todos-heading">Dagens uppgifter</h2>
        </div>
        <div id="todo-list" class="todo-list" aria-label="Dagens uppgifter"></div>
        <div class="todo-add-row">
          <input type="text" id="todo-new-input" class="todo-new-input" placeholder="Lägg till uppgift…" aria-label="Ny uppgift">
          <button class="btn btn-sm btn-primary" id="todo-add-btn" type="button">
            <i data-feather="plus" style="width:14px;height:14px"></i>
            Lägg till
          </button>
        </div>
      </section>

      <!-- Snabbåtgärder -->
      <section class="content-section" aria-labelledby="quickactions-heading">
        <div class="section-header">
          <h2 id="quickactions-heading">Snabbåtgärder</h2>
        </div>
        <div class="quick-actions" id="quick-actions"></div>
      </section>

    </div>
  </main>

  <script src="https://unpkg.com/feather-icons/dist/feather.min.js"></script>
  <script src="js/mock-data.js"></script>
  <script src="js/ui.js"></script>
  <script src="js/navigation.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', function() {
      if (!localStorage.getItem('alpentind-user-logged-in')) {
        window.location.href = 'index.html';
        return;
      }
      initNavigation('nav-1');
      renderDashboard();
    });
  </script>
</body>
</html>
