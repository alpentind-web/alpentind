<!DOCTYPE html>
<html lang="sv">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Accommodation Workspace – AlpenTind Platform</title>
  <link rel="stylesheet" href="css/design-system.css">
  <link rel="stylesheet" href="css/components.css">
  <link rel="stylesheet" href="css/layout.css">
  <link rel="stylesheet" href="css/pages.css">
</head>
<body>

  <aside class="sidebar" id="sidebar" aria-label="Sidopanel"></aside>

  <header class="header" id="header" role="banner"></header>

  <main class="main" id="main-content">
    <div class="page active" id="accommodations-workspace-page">

      <section class="page-header" aria-labelledby="accommodation-workspace-title">
        <nav class="workspace-nav" id="accommodation-workspace-nav" aria-label="Navigeringsstig"></nav>
      </section>

      <div class="register-workspace" id="register-workspace-container"></div>

      <div id="register-workspace-error" hidden>
        <section class="content-section" aria-labelledby="workspace-error-heading">
          <div class="section-header">
            <h2 id="workspace-error-heading">Boende hittades inte</h2>
          </div>
          <p class="text-muted">Boendet kunde inte identifieras i registret. Kontrollera att region och boende-ID är korrekta.</p>
          <a href="accommodations.html" class="btn btn-secondary" style="margin-top:var(--spacing-md)">
            <i data-feather="arrow-left" style="width:16px;height:16px" aria-hidden="true"></i>
            Tillbaka till Boenden
          </a>
        </section>
      </div>

    </div>
  </main>

  <script src="https://unpkg.com/feather-icons/dist/feather.min.js"></script>
  <script src="js/mock-data.js"></script>
  <script src="js/ui.js"></script>
  <script src="js/navigation.js"></script>
  <script src="js/register-selection.js"></script>
  <script src="js/accommodation-store.js"></script>
  <script src="js/register-workspace.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', function() {
      if (!localStorage.getItem('alpentind-user-logged-in')) {
        window.location.href = 'index.html';
        return;
      }
      initNavigation('nav-6');

      var params          = new URLSearchParams(window.location.search);
      var regionSlug      = params.get('region');
      var accommodationId = params.get('accommodation');
      var found           = getAccommodationFromStore(regionSlug, accommodationId);
      var region          = found ? found.region       : null;
      var accommodation   = found ? found.accommodation : null;

      var nav         = document.getElementById('accommodation-workspace-nav');
      var wsContainer = document.getElementById('register-workspace-container');
      var errorBlock  = document.getElementById('register-workspace-error');

      if (!region || !accommodation) {
        if (nav) {
          nav.innerHTML =
            '<a href="accommodations.html" class="link">Boenden</a>'
            + '<span aria-hidden="true">›</span>'
            + '<span>Workspace</span>';
        }
        if (wsContainer) wsContainer.hidden = true;
        if (errorBlock)  errorBlock.hidden  = false;
        if (typeof feather !== 'undefined') feather.replace();
        return;
      }

      if (nav) {
        nav.innerHTML =
          '<a href="accommodations.html" class="link">Boenden</a>'
          + '<span aria-hidden="true">›</span>'
          + '<a href="accommodations.html?region=' + encodeURIComponent(region.slug) + '" class="link">' + region.name + '</a>'
          + '<span aria-hidden="true">›</span>'
          + '<span>' + accommodation.name + '</span>';
      }

      var detail = getAccommodationWorkspaceDetailData(accommodation.id);
      var config  = buildAccommodationWorkspaceConfig(region, accommodation, detail);
      renderRegisterWorkspace(wsContainer, config);
    });
  </script>
</body>
</html>
