<!DOCTYPE html>
<html lang="sv">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Upplevelser – AlpenTind Platform</title>
  <link rel="stylesheet" href="css/design-system.css">
  <link rel="stylesheet" href="css/components.css">
  <link rel="stylesheet" href="css/layout.css">
  <link rel="stylesheet" href="css/pages.css">
</head>
<body>

  <!-- Sidopanel -->
  <aside class="sidebar" id="sidebar" aria-label="Sidopanel"></aside>

  <!-- Sidhuvud -->
  <header class="header" id="header" role="banner"></header>

  <!-- Huvudinnehåll -->
  <main class="main" id="main-content">
    <div class="page active" id="upplevelser-page">

      <div class="page-header">
        <h1>Upplevelser</h1>
        <p class="text-muted">Hantera guidade resor och aktiviteter</p>
      </div>

      <div class="products-toolbar">
        <label class="search-box" for="upplevelse-search">
          <i data-feather="search" style="width:16px;height:16px;color:var(--color-text-dark)" aria-hidden="true"></i>
          <input type="search" id="upplevelse-search" placeholder="Sök upplevelse..." aria-label="Sök upplevelse">
        </label>
        <button class="btn btn-primary">
          <i data-feather="plus" style="width:16px;height:16px"></i>
          Ny upplevelse
        </button>
      </div>

      <div class="grid grid-3" id="products-grid"></div>

    </div>
  </main>

    <script>
      // Upplevelser-registret är inte längre landningssida för Upplevelser.
      // Navigera direkt till Planeringsöversikten.
      window.location.replace('planering.html');
    </script>
</body>
</html>
